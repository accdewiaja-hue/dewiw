<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎨 Draw</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(180deg, #e8f4ff 0%, #c9e2ff 40%, #b3d9ff 100%);
      min-height: 100vh;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #4a6a8a;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { color: #1a3a5c; }

    .draw-container {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 20px;
      border: 2px dashed rgba(255,255,255,0.6);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: white;
      border-radius: 16px;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 2px 16px rgba(179, 217, 255, 0.2);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
      justify-content: center;
    }

    .toolbar .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .toolbar .color-btn:hover { transform: scale(1.2); }
    .toolbar .color-btn.active {
      border-color: #1a3a5c;
      transform: scale(1.15);
    }

    .toolbar input[type="range"] {
      width: 100px;
      accent-color: #b3d9ff;
    }

    .toolbar .size-label {
      font-size: 13px;
      color: #4a6a8a;
      font-weight: 600;
    }

    .toolbar .action-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 20px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s ease;
      background: rgba(255,255,255,0.7);
      color: #1a3a5c;
    }
    .toolbar .action-btn:hover {
      transform: scale(1.05);
    }
    .toolbar .action-btn.danger {
      background: rgba(255,200,200,0.7);
      color: #a33;
    }
  </style>
</head>
<body>
  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
  </div>

  <div class="container">
    <a href="index.html" class="back-link">← Kembali</a>

    <h1 style="font-size:22px;text-align:center;margin-bottom:16px">🎨 Draw — gambar apa aja!</h1>

    <div class="draw-container">
      <canvas id="drawCanvas"></canvas>

      <div class="toolbar">
        <div class="color-btn" style="background:#2c3e50" data-color="#2c3e50"></div>
        <div class="color-btn" style="background:#e74c3c" data-color="#e74c3c"></div>
        <div class="color-btn" style="background:#e67e22" data-color="#e67e22"></div>
        <div class="color-btn" style="background:#f1c40f" data-color="#f1c40f"></div>
        <div class="color-btn" style="background:#2ecc71" data-color="#2ecc71"></div>
        <div class="color-btn active" style="background:#3498db" data-color="#3498db"></div>
        <div class="color-btn" style="background:#9b59b6" data-color="#9b59b6"></div>
        <div class="color-btn" style="background:#ff69b4" data-color="#ff69b4"></div>
        <div class="color-btn" style="background:white;border-color:#ccc" data-color="#ffffff"></div>

        <span class="size-label">✏️</span>
        <input type="range" id="brushSize" min="2" max="30" value="4" />

        <button class="action-btn" onclick="undo()">↩️ Undo</button>
        <button class="action-btn danger" onclick="clearCanvas()">🗑️ Hapus</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentColor = '#3498db';
    let brushSize = 4;
    let history = [];
    let maxHistory = 20;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      ctx.scale(2, 2);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      restoreHistory();
    }

    function saveState() {
      history.push(canvas.toDataURL());
      if (history.length > maxHistory) history.shift();
    }

    function restoreHistory() {
      if (history.length > 0) {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, canvas.width / 2, canvas.height / 2);
        };
        img.src = history[history.length - 1];
      } else {
        ctx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
      }
    }

    function undo() {
      if (history.length > 1) {
        history.pop();
        ctx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
        restoreHistory();
      }
    }

    function clearCanvas() {
      if (confirm('Yakin mau hapus semua gambar?')) {
        history = [];
        ctx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
        saveState();
      }
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      e.preventDefault();
      if (!drawing) return;
      const pos = getPos(e);
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = brushSize;
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function stopDraw(e) {
      if (drawing) {
        drawing = false;
        ctx.beginPath();
        saveState();
      }
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = btn.dataset.color;
      });
    });

    document.getElementById('brushSize').addEventListener('input', e => {
      brushSize = parseInt(e.target.value);
    });

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);

    saveState();
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
